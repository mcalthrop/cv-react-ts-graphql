name: Pull Request

on:
  pull_request:
    paths-ignore:
      - README.md

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.1

      - name: Get node version
        id: get-node-version
        run: |
          NODE_VERSION=$(cat .nvmrc)
          echo "NODE_VERSION=${NODE_VERSION}"
          echo "node-version=${NODE_VERSION}" >> $GITHUB_OUTPUT

      - name: Set up node ${{ steps.get-node-version.outputs.node-version }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ steps.get-node-version.outputs.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Knip
        run: pnpm knip

      - name: Compile
        run: pnpm compile

      - name: Build
        run: pnpm build

      - name: Lint & format
        run: pnpm check

      - name: Test
        run: pnpm test
